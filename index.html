<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#080810"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="BudgetSplit"/>
<title>BudgetSplit</title>
<link rel="icon" type="image/svg+xml" href="icon-192.svg"/>
<link rel="shortcut icon" href="icon-192.svg"/>
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.svg"/>
<link rel="manifest" href="manifest.json"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --surface2: #15151f;
  --border: #1e1e30;
  --border2: #252538;
  --text: #e8e8f5;
  --muted: #5a5a7a;
  --accent: #6366f1;
  --accent2: #818cf8;
  --green: #34d399;
  --yellow: #fbbf24;
  --red: #f87171;
  --pink: #f472b6;
  --blue: #60a5fa;
  --orange: #fb923c;
  --font: 'Space Grotesk', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

  /* LIGHT MODE */
body.light {
  --bg: #f7f7ff;
  --surface: #ffffff;
  --surface2: #ededfa;
  --border: #d4d4f0;
  --border2: #c0c0e0;
  --text: #12121e;
  --muted: #7070a0;
  --accent: #4f46e5;
  --accent2: #6366f1;
  --green: #059669;
  --yellow: #d97706;
  --red: #dc2626;
  --pink: #db2777;
  --blue: #2563eb;
  --orange: #ea580c;
}

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    overscroll-behavior: none;
    transition: background 0.3s, color 0.3s;
  }

  #app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .bg-glow {
    position: fixed;
    top: -120px; left: 50%;
    transform: translateX(-50%);
    width: 500px; height: 300px;
    background: radial-gradient(ellipse, rgba(99,102,241,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    padding: 52px 24px 20px;
    position: relative;
    z-index: 1;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .header-left {}

  .header-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .header-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #e8e8f5 0%, #818cf8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  body.light .header-title {
    background: linear-gradient(135deg, #12121e 0%, #4f46e5 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* THEME TOGGLE */
  .theme-toggle {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .theme-toggle:active { transform: scale(0.9); }

  .tabs {
    display: flex;
    padding: 0 16px;
    gap: 4px;
    position: relative;
    z-index: 1;
  }

  .tab-btn {
    flex: 1;
    padding: 10px 4px;
    background: none;
    border: none;
    border-radius: 10px;
    font-family: var(--font);
    font-size: 11px;
    letter-spacing: 0.5px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .tab-btn.active {
    color: var(--text);
    background: var(--surface2);
  }

  .tab-icon { font-size: 18px; }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px 100px;
    position: relative;
    z-index: 1;
    -webkit-overflow-scrolling: touch;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 14px;
  }

  .card-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .input-wrap {
    flex: 1;
    position: relative;
  }

  .main-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 14px 70px 14px 16px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 700;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .main-input:focus { border-color: var(--accent); }

  .currency-badge {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: #1a1a2e;
    border: 1px solid #2a2a4e;
    border-radius: 8px;
    padding: 3px 8px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--accent2);
    pointer-events: none;
  }

  body.light .currency-badge {
    background: #ededfa;
    border-color: #c0c0e0;
    color: #4f46e5;
  }

  .submit-btn {
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border: none;
    border-radius: 12px;
    padding: 0 20px;
    font-size: 22px;
    cursor: pointer;
    transition: all 0.2s;
    color: white;
    font-weight: 700;
    flex-shrink: 0;
  }

  .submit-btn:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }
  .submit-btn:not(:disabled):active { transform: scale(0.95); }

  /* NOTE INPUT */
  .note-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    outline: none;
    margin-top: 10px;
    transition: border-color 0.2s;
    resize: none;
  }
  .note-input:focus { border-color: var(--accent); }
  .note-input::placeholder { color: var(--muted); }

  /* RECURRING */
  .recurring-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 10px;
    color: #e8e8f5; /* fallback direct */
    color: var(--text);
  }
  .recurring-chip.active {
    background: rgba(99,102,241,0.15);
    border-color: var(--accent);
    color: var(--text);  /* ← texte toujours lisible en sombre et clair */
  }

  .recurring-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 14px;
  }

  .recurring-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .recurring-item:hover { border-color: var(--accent); }

  .recurring-item .ri-info { flex: 1; }
  .recurring-item .ri-name { font-size: 13px; font-weight: 600; }
  .recurring-item .ri-amount { font-family: var(--mono); font-size: 12px; color: var(--green); }
  .recurring-item .ri-note { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .recurring-item .ri-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; opacity: 0.5; transition: opacity 0.2s; }
  .recurring-item .ri-del:hover { opacity: 1; color: var(--red); }

  /* SPLIT ROWS */
  .split-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.2s;
  }

  .split-row:hover { border-color: var(--border2); }

  .split-icon {
    width: 40px;
    height: 40px;
    border-radius: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .split-info { flex: 1; min-width: 0; }

  .split-name {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .split-bar-bg {
    height: 3px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .split-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }

  .split-amount { text-align: right; }

  .split-money {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
  }

  .split-pct {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* GOAL */
  .goal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }

  .goal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .goal-name {
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .goal-amounts {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  .goal-bar-bg {
    height: 6px;
    background: var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .goal-bar-fill {
    height: 100%;
    border-radius: 6px;
    background: linear-gradient(90deg, var(--accent), var(--green));
    transition: width 0.6s ease;
  }

  .goal-pct {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }

  .goal-deadline {
    font-size: 11px;
    color: var(--yellow);
    margin-top: 4px;
    font-family: var(--mono);
  }

  /* CHART */
  .chart-wrap {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 10px 0;
  }

  canvas#pie { flex-shrink: 0; }

  .chart-legend { flex: 1; display: flex; flex-direction: column; gap: 8px; }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* BAR CHART */
  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 120px;
    padding: 0 4px;
    margin-bottom: 8px;
  }

  .bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    height: 100%;
    justify-content: flex-end;
    cursor: pointer;
  }

  .bar-fill {
    width: 100%;
    border-radius: 6px 6px 0 0;
    transition: height 0.5s cubic-bezier(0.34,1.56,0.64,1);
    background: linear-gradient(180deg, var(--accent), #8b5cf6);
    min-height: 4px;
  }

  .bar-fill.current { background: linear-gradient(180deg, var(--green), #34d399aa); }

  .bar-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    text-align: center;
    white-space: nowrap;
  }

  .bar-val {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text);
    text-align: center;
  }

  /* PROJECTION */
  .projection-card {
    background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(52,211,153,0.05));
    border: 1px solid rgba(99,102,241,0.3);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
  }

  .projection-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .projection-row:last-child { border-bottom: none; }
  .projection-val { font-family: var(--mono); font-weight: 700; color: var(--green); }

  /* SETTINGS */
  .setting-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }

  .setting-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .setting-emoji { font-size: 20px; }

  .setting-name-input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    font-weight: 600;
    outline: none;
    padding: 2px 4px;
  }

  .setting-pct-input {
    width: 58px;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 6px 10px;
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    outline: none;
    color: var(--text);
  }

  .setting-slider {
    width: 100%;
    height: 4px;
    border-radius: 4px;
    appearance: none;
    cursor: pointer;
    outline: none;
  }

  .styled-select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 12px 14px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    outline: none;
    cursor: pointer;
    appearance: none;
  }

  .total-pill {
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    margin-bottom: 14px;
  }

  .total-pill.ok { background:#0d2b1a; border:1px solid #22c55e44; }
  .total-pill.bad { background:#2b0d0d; border:1px solid #f8717144; }

  body.light .total-pill.ok { background:#d1fae5; border-color:#22c55e66; }
  body.light .total-pill.bad { background:#fee2e2; border-color:#f8717166; }

  .ghost-btn {
    width: 100%;
    padding: 12px;
    background: none;
    border: 1px solid var(--border2);
    border-radius: 12px;
    color: var(--muted);
    font-family: var(--font);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 8px;
  }

  .ghost-btn:hover { border-color: var(--accent); color: var(--text); }

  /* HISTORY */
  .history-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .history-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .history-note-tag {
    font-size: 11px;
    color: var(--accent2);
    margin-top: 3px;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .history-total {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--green);
  }

  .history-splits { display: flex; flex-direction: column; gap: 6px; }

  .history-split-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
  }

  .history-split-left {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
  }

  .history-delete {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    margin-left: 8px;
    opacity: 0.5;
    transition: opacity 0.2s;
  }

  .history-delete:hover { opacity: 1; color: var(--red); }

  /* EDIT MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 500;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 22px 22px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 480px;
    animation: slideUp2 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes slideUp2 {
    from { transform: translateY(100px); opacity:0 }
    to { transform: translateY(0); opacity:1 }
  }

  .modal-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-close {
    background: none; border: none; color: var(--muted);
    font-size: 20px; cursor: pointer;
  }

  .modal-field {
    margin-bottom: 12px;
  }

  .modal-field label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    display: block;
    margin-bottom: 6px;
  }

  .modal-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    font-weight: 600;
    outline: none;
    -webkit-appearance: none;
  }

  .modal-input:focus { border-color: var(--accent); }

  .modal-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 6px;
  }

  /* GOAL FORM */
  .goal-form {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 10px;
    align-items: center;
    margin-top: 14px;
  }

  .form-input {
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    outline: none;
    width: 100%;
  }

  .add-btn {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    width: 38px;
    height: 38px;
    font-size: 20px;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s;
  }

  .add-btn:active { transform: scale(0.9); }

.export-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 10px;
}

.export-btn:hover {
  border-color: var(--accent);
}

  #install-banner {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border-radius: 14px;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 999;
    box-shadow: 0 8px 32px rgba(99,102,241,0.4);
    max-width: 440px;
    width: calc(100% - 32px);
    animation: slideUp3 0.4s ease;
    display: none;
  }

  @keyframes slideUp3 {
    from { transform: translateX(-50%) translateY(20px); opacity:0; }
    to { transform: translateX(-50%) translateY(0); opacity:1; }
  }

  #install-banner .inst-text { flex:1; font-size: 13px; font-weight: 600; }
  #install-banner .inst-close { background:none; border:none; color:white; font-size:18px; cursor:pointer; opacity:0.7; }
  #install-banner .inst-go { background:white; color:var(--accent); border:none; border-radius:8px; padding:6px 14px; font-family:var(--font); font-size:12px; font-weight:700; cursor:pointer; }

  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: rgba(8,8,16,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }

  body.light .bottom-nav {
    background: rgba(240,240,248,0.92);
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  #toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .month-header {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    padding: 8px 4px;

  }

  .month-total-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--surface2);
    border-radius: 10px;
    margin-bottom: 12px;
    font-size: 13px;
  }

  /* SOLDE DISPO */
  .balance-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .balance-row:last-child { border-bottom: none; }
  .balance-spent {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--red);
  }
  .balance-left {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--green);
    font-weight: 700;
  }
  .spend-btn {
    background: none;
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 3px 10px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .spend-btn:hover { border-color: var(--red); color: var(--red); }

  .scroll-hidden::-webkit-scrollbar { display: none; }
  .scroll-hidden { scrollbar-width: none; }


@media (max-width: 360px) {
  .main-input { font-size: 20px; padding: 12px 60px 12px 12px; }
  .split-money { font-size: 13px; }
  .tab-btn { font-size: 10px; }
  .tab-icon { font-size: 16px; }
  .header-title { font-size: 22px; }
  .card { padding: 14px; }
}

@media (min-width: 481px) {
  #app { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div id="app">
  <header>
    <div class="header-left">
      <div class="header-label">Gestionnaire financier</div>
      <div class="header-title">💰 BudgetSplit</div>
    </div>
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙</button>
  </header>

  <div class="tabs" id="tabs"></div>
  <div class="content scroll-hidden" id="content"></div>

  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<div id="install-banner">
  <span class="inst-text">📲 Installer l'app sur ton téléphone</span>
  <button class="inst-go" id="install-go">Installer</button>
  <button class="inst-close" id="install-close">✕</button>
</div>

<div id="toast"></div>
<div id="modal-root"></div>

<script>
// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const COLORS = ['#6366f1','#34d399','#fbbf24','#f472b6','#60a5fa','#fb923c','#a78bfa','#2dd4bf'];

const CURRENCIES = [
  { code:'XOF', label:'FCFA (Afrique de l\'Ouest)', symbol:'FCFA' },
  { code:'XAF', label:'FCFA (Afrique Centrale)', symbol:'FCFA' },
  { code:'EUR', label:'Euro', symbol:'€' },
  { code:'USD', label:'Dollar américain', symbol:'$' },
  { code:'GBP', label:'Livre sterling', symbol:'£' },
  { code:'CAD', label:'Dollar canadien', symbol:'CA$' },
  { code:'MAD', label:'Dirham marocain', symbol:'MAD' },
  { code:'GNF', label:'Franc guinéen', symbol:'GNF' },
  { code:'MGA', label:'Ariary malgache', symbol:'Ar' },
];

let state = {
  tab: 'home',
  currency: 'XOF',
  theme: 'dark',
  income: '',
  incomeNote: '',
  isRecurring: false,
  categories: [
    { id:1, emoji:'🏠', name:'Vie quotidienne', pct:30, color:COLORS[0] },
    { id:2, emoji:'💼', name:'Opérationnel', pct:30, color:COLORS[1] },
    { id:3, emoji:'💻', name:'Matériel / Outils', pct:10, color:COLORS[2] },
    { id:4, emoji:'🏦', name:'Épargne', pct:20, color:COLORS[3] },
    { id:5, emoji:'👗', name:'Vêtements / Perso', pct:10, color:COLORS[4] },
  ],
  history: [],
  goals: [],
  goalForm: { name:'', target:'', deadline:'' },
  recurringIncomes: [],
  // spending tracking per entry category
};

try {
  const saved = localStorage.getItem('budgetsplit_v2');
  if (saved) {
    const parsed = JSON.parse(saved);
    state = { ...state, ...parsed, tab:'home', income:'', incomeNote:'', isRecurring:false };
  }
} catch(e) {}

// Apply theme on load
if (state.theme === 'light') document.body.classList.add('light');

function save() {
  try {
    localStorage.setItem('budgetsplit_v2', JSON.stringify({
      currency: state.currency,
      theme: state.theme,
      categories: state.categories,
      history: state.history,
      goals: state.goals,
      recurringIncomes: state.recurringIncomes || [],
    }));
  } catch(e) {}
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function fmt(val) {
  if (val === null || val === undefined || isNaN(val)) return '—';
  const cur = CURRENCIES.find(c => c.code === state.currency) || CURRENCIES[0];
  const n = new Intl.NumberFormat('fr-FR', { maximumFractionDigits: 0 }).format(val);
  return `${n} ${cur.symbol}`;
}

function curSymbol() {
  return (CURRENCIES.find(c => c.code === state.currency) || CURRENCIES[0]).symbol;
}

function total() {
  return state.categories.reduce((s,c) => s + Number(c.pct), 0);
}

function parseIncome() {
  return parseFloat((state.income || '').replace(',','.')) || 0;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function groupByMonth(history) {
  const groups = {};
  history.forEach(e => {
    const key = e.monthKey || 'Inconnu';
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  });
  return groups;
}

function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  document.body.classList.toggle('light', state.theme === 'light');
  document.getElementById('theme-toggle').textContent = state.theme === 'dark' ? '🌙' : '☀️';
  save();
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render() {
  document.getElementById('theme-toggle').textContent = state.theme === 'dark' ? '🌙' : '☀️';
  renderTabs();
  renderContent();
}

function renderTabs() {
  const tabs = [
    { id:'home', icon:'🏠', label:'Accueil' },
    { id:'chart', icon:'📊', label:'Stats' },
    { id:'goals', icon:'🎯', label:'Objectifs' },
    { id:'history', icon:'📋', label:'Historique' },
    { id:'settings', icon:'⚙️', label:'Paramètres' },
  ];
  document.getElementById('bottom-nav').innerHTML = tabs.map(t => `
    <button class="tab-btn ${state.tab===t.id?'active':''}" onclick="setTab('${t.id}')">
      <span class="tab-icon">${t.icon}</span>
      <span>${t.label}</span>
    </button>
  `).join('');
  document.getElementById('tabs').innerHTML = '';
}

function setTab(tab) {
  state.tab = tab;
  render();
}

function renderContent() {
  const c = document.getElementById('content');
  if (state.tab === 'home') c.innerHTML = renderHome();
  else if (state.tab === 'chart') c.innerHTML = renderChart();
  else if (state.tab === 'goals') c.innerHTML = renderGoals();
  else if (state.tab === 'history') c.innerHTML = renderHistory();
  else if (state.tab === 'settings') c.innerHTML = renderSettings();

  if (state.tab === 'chart') { drawPie(); drawBarChart(); }
}

// ── HOME ──
function renderHome() {
  const parsed = parseIncome();
  const ok = total() === 100;
  const splits = state.categories.map(c => ({
    ...c,
    montant: parsed ? (parsed * c.pct / 100) : null
  }));

  const recs = (state.recurringIncomes || []);

  return `
    ${recs.length > 0 ? `
    <div class="card">
      <div class="card-label">Revenus récurrents</div>
      <div class="recurring-list">
        ${recs.map((r,i) => `
          <div class="recurring-item" onclick="loadRecurring(${i})">
            <div style="font-size:20px">🔄</div>
            <div class="ri-info">
              <div class="ri-name">${r.name}</div>
              <div class="ri-amount">${fmt(r.amount)}</div>
              ${r.note ? `<div class="ri-note">${r.note}</div>` : ''}
            </div>
            <button class="ri-del" onclick="deleteRecurring(event,${i})">✕</button>
          </div>
        `).join('')}
      </div>
    </div>
    ` : ''}

    <div class="card">
      <div class="card-label">Montant reçu</div>
      <div class="input-row">
        <div class="input-wrap">
          <input class="main-input" type="number" placeholder="0" value="${state.income}"
            oninput="state.income=this.value; renderSplits()"
            id="income-input"/>
          <span class="currency-badge">${curSymbol()}</span>
        </div>
        <button class="submit-btn" ${!parsed||!ok?'disabled':''} onclick="addEntry()">✓</button>
      </div>
      <textarea class="note-input" placeholder="📝 Note (ex: Salaire avril, Freelance client X...)" rows="2"
        oninput="state.incomeNote=this.value">${state.incomeNote||''}</textarea>
      <div style="display:flex;gap:8px;margin-top:8px;align-items:center;">
        <button class="recurring-chip ${state.isRecurring?'active':''}" onclick="state.isRecurring=!state.isRecurring;render()">
          🔄 ${state.isRecurring ? 'Récurrent activé' : 'Marquer comme récurrent'}
        </button>
      </div>
      ${!ok ? `<div style="margin-top:10px;font-family:var(--mono);font-size:11px;color:var(--red)">⚠ Total = ${total()}% (doit être 100%)</div>` : ''}
    </div>

    <div id="splits-list">
      ${splits.map(c => renderSplitRow(c)).join('')}
    </div>
  `;
}

function renderSplitRow(c) {
  return `
    <div class="split-row">
      <div class="split-icon" style="background:${c.color}18;border:1px solid ${c.color}33">
        ${c.emoji}
      </div>
      <div class="split-info">
        <div class="split-name">${c.name}</div>
        <div class="split-bar-bg">
          <div class="split-bar-fill" style="width:${c.pct}%;background:${c.color}"></div>
        </div>
      </div>
      <div class="split-amount">
        <div class="split-money" style="color:${c.color}">${c.montant !== null ? fmt(c.montant) : '—'}</div>
        <div class="split-pct">${c.pct}%</div>
      </div>
    </div>
  `;
}

function triggerInstall() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(({ outcome }) => {
      deferredPrompt = null;
      if (outcome === 'accepted') toast('🎉 App installée !');
    });
  } else {
    // Fallback manuel clair selon le navigateur
    const isSamsung = /SamsungBrowser/i.test(navigator.userAgent);
    const isChrome = /Chrome/i.test(navigator.userAgent) && !/SamsungBrowser/i.test(navigator.userAgent);
    if (isSamsung) {
      toast('📲 Menu ⋮ → "Ajouter page à" → "Écran d\'accueil"');
    } else if (isChrome) {
      toast('📲 Menu ⋮ → "Ajouter à l\'écran d\'accueil"');
    } else {
      toast('📲 Menu du navigateur → "Ajouter à l\'écran d\'accueil"');
    }
  }
}

function renderSplits() {
  const parsed = parseIncome();
  const list = document.getElementById('splits-list');
  if (!list) return;
  const splits = state.categories.map(c => ({
    ...c,
    montant: parsed ? (parsed * c.pct / 100) : null
  }));
  list.innerHTML = splits.map(renderSplitRow).join('');
  const btn = document.querySelector('.submit-btn');
  if (btn) btn.disabled = !parsed || total() !== 100;
}

function loadRecurring(i) {
  const r = state.recurringIncomes[i];
  state.income = String(r.amount);
  state.incomeNote = r.note || '';
  render();
  toast('🔄 Revenu récurrent chargé !');
}

function deleteRecurring(e, i) {
  e.stopPropagation();
  state.recurringIncomes.splice(i, 1);
  save();
  render();
  toast('🗑 Récurrent supprimé');
}

function addEntry() {
  const parsed = parseIncome();
  if (!parsed || total() !== 100) return;
  const now = new Date();

  // Save as recurring if flagged
  if (state.isRecurring && state.incomeNote.trim()) {
    const exists = (state.recurringIncomes || []).find(r => r.name === state.incomeNote.trim());
    if (!exists) {
      if (!state.recurringIncomes) state.recurringIncomes = [];
      state.recurringIncomes.push({
        name: state.incomeNote.trim(),
        amount: parsed,
        note: ''
      });
      toast('🔄 Revenu récurrent enregistré !');
    }
  }

  const entry = {
    id: Date.now(),
    amount: parsed,
    note: state.incomeNote.trim(),
    date: now.toLocaleDateString('fr-FR'),
    monthKey: now.toLocaleDateString('fr-FR', { month:'long', year:'numeric' }),
    splits: state.categories.map(c => ({ ...c, montant: parsed * c.pct / 100, spent: 0 })),
  };

  // Add to savings goals
  state.goals = state.goals.map(g => {
    const savingsCat = state.categories.find(c => c.name.toLowerCase().includes('épargne') || c.emoji === '🏦');
    if (savingsCat) {
      const added = parsed * savingsCat.pct / 100;
      return { ...g, current: (g.current || 0) + added };
    }
    return g;
  });

  state.history = [entry, ...state.history];
  state.income = '';
  state.incomeNote = '';
  state.isRecurring = false;
  save();
  toast('✅ Entrée enregistrée !');
  render();
}

// ── CHART ──
function renderChart() {
  const months = Object.keys(groupByMonth(state.history)).slice(0, 6).reverse();
  const monthGroups = groupByMonth(state.history);
  const hasData = state.history.length > 0;

  // Projection (average last 3 months * 12)
  const last3 = Object.values(groupByMonth(state.history)).slice(0,3);
  const avgMonthly = last3.length > 0 ? last3.reduce((s,m) => s + m.reduce((ss,e) => ss+e.amount,0), 0) / last3.length : 0;
  const savingsCat = state.categories.find(c => c.name.toLowerCase().includes('épargne') || c.emoji === '🏦');
  const savingsPct = savingsCat ? savingsCat.pct / 100 : 0;

  return `
    <div class="card">
      <div class="card-label">Répartition</div>
      <div class="chart-wrap">
        <canvas id="pie" width="140" height="140"></canvas>
        <div class="chart-legend">
          ${state.categories.map(c => `
            <div class="legend-item">
              <div class="legend-dot" style="background:${c.color}"></div>
              <span style="flex:1;font-size:12px">${c.emoji} ${c.name}</span>
              <span style="font-family:var(--mono);font-size:12px;color:var(--muted)">${c.pct}%</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    ${hasData ? `
    <div class="card">
      <div class="card-label">Revenus par mois</div>
      <div class="bar-chart" id="bar-chart">
        ${months.map((m, idx) => {
          const total = (monthGroups[m] || []).reduce((s,e)=>s+e.amount,0);
          return `<div class="bar-col" title="${m}: ${fmt(total)}">
            <div class="bar-val" style="font-size:9px;color:var(--muted)">&nbsp;</div>
            <div class="bar-fill ${idx===months.length-1?'current':''}" id="bar-${idx}" style="height:4px" data-val="${total}" data-max="0"></div>
            <div class="bar-label">${m.split(' ')[0].substring(0,3)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="card">
      <div class="card-label">Total par catégorie</div>
      ${state.categories.map(c => {
        const tot = state.history.reduce((s,e) => {
          const sp = e.splits.find(s => s.id === c.id);
          return s + (sp ? sp.montant : 0);
        }, 0);
        const max = Math.max(...state.categories.map(cat => state.history.reduce((s,e) => {
          const sp = e.splits.find(s => s.id === cat.id);
          return s + (sp ? sp.montant : 0);
        }, 0)));
        const pct = max > 0 ? (tot / max * 100) : 0;
        return `
          <div style="margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px">
              <span>${c.emoji} ${c.name}</span>
              <span style="font-family:var(--mono);color:${c.color}">${fmt(tot)}</span>
            </div>
            <div class="split-bar-bg">
              <div class="split-bar-fill" style="width:${pct}%;background:${c.color}"></div>
            </div>
          </div>
        `;
      }).join('')}
    </div>

    ${avgMonthly > 0 ? `
    <div class="projection-card">
      <div style="font-family:var(--mono);font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:12px">Projection annuelle</div>
      <div class="projection-row">
        <span>Revenu moyen/mois</span>
        <span class="projection-val">${fmt(Math.round(avgMonthly))}</span>
      </div>
      <div class="projection-row">
        <span>Revenus estimés sur 12 mois</span>
        <span class="projection-val">${fmt(Math.round(avgMonthly * 12))}</span>
      </div>
      ${savingsPct > 0 ? `
      <div class="projection-row">
        <span>Épargne estimée sur 12 mois</span>
        <span class="projection-val" style="color:var(--green)">${fmt(Math.round(avgMonthly * 12 * savingsPct))}</span>
      </div>` : ''}
    </div>` : ''}
    ` : `<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">Ajoute des entrées pour voir les stats</div></div>`}
  `;
}

function drawPie() {
  const canvas = document.getElementById('pie');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const cx = 70, cy = 70, r = 60, inner = 35;
  let angle = -Math.PI / 2;

  ctx.clearRect(0, 0, 140, 140);

  state.categories.forEach(c => {
    const slice = (c.pct / 100) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, angle, angle + slice);
    ctx.closePath();
    ctx.fillStyle = c.color;
    ctx.fill();
    angle += slice;
  });

  const bgColor = state.theme === 'light' ? '#ffffff' : '#080810';
  ctx.beginPath();
  ctx.arc(cx, cy, inner, 0, Math.PI * 2);
  ctx.fillStyle = bgColor;
  ctx.fill();

  ctx.fillStyle = state.theme === 'light' ? '#18182a' : '#e8e8f5';
  ctx.font = 'bold 14px JetBrains Mono, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('100%', cx, cy);
}

function drawBarChart() {
  const bars = document.querySelectorAll('.bar-fill[data-val]');
  if (!bars.length) return;
  const vals = Array.from(bars).map(b => parseFloat(b.dataset.val) || 0);
  const max = Math.max(...vals, 1);
  bars.forEach(b => {
    const h = Math.max(4, (parseFloat(b.dataset.val) / max) * 100);
    setTimeout(() => { b.style.height = h + 'px'; }, 100);
  });
}

// ── GOALS ──
function renderGoals() {
  return `
    <div class="card">
      <div class="card-label">Objectifs d'épargne</div>
      ${state.goals.length === 0 ? `<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px 0">Aucun objectif. Ajoutes-en un !</div>` : ''}
      ${state.goals.map((g, i) => {
        const pct = Math.min(100, g.target > 0 ? (g.current / g.target * 100) : 0);
        const done = pct >= 100;
        let deadlineText = '';
        if (g.deadline && !done) {
          const today = new Date();
          const dl = new Date(g.deadline);
          const diffDays = Math.ceil((dl - today) / (1000*60*60*24));
          const monthlySavings = (() => {
            const last3 = Object.values(groupByMonth(state.history)).slice(0,3);
            const avg = last3.length > 0 ? last3.reduce((s,m) => s + m.reduce((ss,e) => ss+e.amount,0), 0) / last3.length : 0;
            const sp = state.categories.find(c => c.name.toLowerCase().includes('épargne') || c.emoji === '🏦');
            return sp ? avg * sp.pct / 100 : 0;
          })();
          const remaining = g.target - g.current;
          const monthsNeeded = monthlySavings > 0 ? Math.ceil(remaining / monthlySavings) : null;
          if (diffDays > 0) {
            deadlineText = `📅 Échéance dans ${diffDays} jour${diffDays>1?'s':''} · ${monthsNeeded ? `~${monthsNeeded} mois nécessaires` : 'Ajoute des revenus pour estimer'}`;
          } else {
            deadlineText = `⚠️ Échéance dépassée`;
          }
        }
        return `
          <div class="goal-card">
            <div class="goal-header">
              <div class="goal-name">
                ${done ? '🏆' : '🎯'} ${g.name}
                <button onclick="deleteGoal(${i})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;opacity:0.5">✕</button>
              </div>
              <div class="goal-amounts">${fmt(g.current)} / ${fmt(g.target)}</div>
            </div>
            <div class="goal-bar-bg">
              <div class="goal-bar-fill" style="width:${pct}%;${done?'background:var(--green)':''}"></div>
            </div>
            <div class="goal-pct" style="color:${done?'var(--green)':'var(--muted)'}">${pct.toFixed(0)}% ${done?'✅ Atteint !':''}</div>
            ${deadlineText ? `<div class="goal-deadline">${deadlineText}</div>` : ''}
          </div>
        `;
      }).join('')}

      <div class="goal-form" style="grid-template-columns:1fr 1fr auto">
        <input class="form-input" placeholder="Nom (ex: PC)" id="goal-name" value="${state.goalForm.name}" oninput="state.goalForm.name=this.value"/>
        <input class="form-input" placeholder="Cible" type="number" id="goal-target" value="${state.goalForm.target}" oninput="state.goalForm.target=this.value"/>
        <button class="add-btn" onclick="addGoal()">+</button>
      </div>
      <input class="form-input" placeholder="📅 Date cible (optionnel)" type="date" id="goal-deadline"
        value="${state.goalForm.deadline||''}"
        oninput="state.goalForm.deadline=this.value"
        style="width:100%;margin-top:8px;background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;"/>
      <div style="margin-top:6px;font-size:11px;color:var(--muted);font-family:var(--mono)">
        Les entrées alimentent auto l'épargne 🏦
      </div>
    </div>

    <div class="card">
      <div class="card-label">Épargne totale accumulée</div>
      <div style="font-family:var(--mono);font-size:28px;font-weight:700;color:var(--green);text-align:center;padding:12px 0">
        ${fmt(state.history.reduce((s,e) => {
          const sp = e.splits.find(sp => sp.emoji === '🏦' || sp.name.toLowerCase().includes('épargne'));
          return s + (sp ? sp.montant : 0);
        }, 0))}
      </div>
    </div>
  `;
}

function addGoal() {
  const name = state.goalForm.name.trim();
  const target = parseFloat(state.goalForm.target);
  if (!name || !target || target <= 0) { toast('⚠ Remplis les deux champs'); return; }
  state.goals.push({ name, target, current: 0, deadline: state.goalForm.deadline || '' });
  state.goalForm = { name:'', target:'', deadline:'' };
  save();
  toast('🎯 Objectif ajouté !');
  render();
}

function deleteGoal(i) {
  state.goals.splice(i, 1);
  save();
  render();
}

// ── HISTORY ──
function renderHistory() {
  if (state.history.length === 0) return `
    <div class="empty">
      <div class="empty-icon">💸</div>
      <div class="empty-text">Aucune entrée pour l'instant</div>
    </div>
  `;

  const groups = groupByMonth(state.history);

  return `
    ${Object.entries(groups).map(([month, entries]) => {
      const monthTotal = entries.reduce((s,e) => s+e.amount, 0);
      return `
        <div class="month-header">${month}</div>
        <div class="month-total-row">
          <span style="color:var(--muted)">Total du mois</span>
          <span style="font-family:var(--mono);font-weight:700;color:var(--green)">${fmt(monthTotal)}</span>
        </div>
        ${entries.map((e) => {
          const realIdx = state.history.findIndex(h => h.id === e.id);
          return `
            <div class="history-card">
              <div class="history-header">
                <div>
                  <div class="history-date">${e.date}</div>
                  ${e.note ? `<div class="history-note-tag">📝 ${e.note}</div>` : ''}
                </div>
                <div style="display:flex;align-items:center;gap:8px">
                  <div class="history-total">${fmt(e.amount)}</div>
                  <button class="history-delete" onclick="openEditModal(${realIdx})" title="Modifier">✏️</button>
                  <button class="history-delete" onclick="deleteEntry(${realIdx})">🗑</button>
                </div>
              </div>
              <div class="history-splits">
                ${e.splits.map(s => `
                  <div class="history-split-row">
                    <div class="history-split-left">
                      <span>${s.emoji}</span>
                      <span>${s.name}</span>
                    </div>
                    <span style="font-family:var(--mono);font-size:13px;color:${s.color};font-weight:600">${fmt(s.montant)}</span>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        }).join('')}
      `;
    }).join('')}

    <div style="display:flex;flex-direction:column;gap:10px;margin-top:8px">
      <button class="export-btn" onclick="exportCSV()">📥 Exporter en CSV</button>
      <button class="export-btn" onclick="exportPDF()" style="background:linear-gradient(135deg,#1a1a2e,#2a1a2a);color:#e8e8f5">📄 Récap PDF du mois</button>
    </div>
  `;
}

function openEditModal(idx) {
  const entry = state.history[idx];
  if (!entry) return;
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal-box">
        <div class="modal-title">
          Modifier l'entrée
          <button class="modal-close" onclick="closeModalForce()">✕</button>
        </div>
        <div class="modal-field">
          <label>Montant</label>
          <input class="modal-input" type="number" id="edit-amount" value="${entry.amount}"/>
        </div>
        <div class="modal-field">
          <label>Note</label>
          <input class="modal-input" type="text" id="edit-note" value="${entry.note||''}" placeholder="Ajouter une note..."/>
        </div>
        <button class="modal-btn" onclick="saveEdit(${idx})">💾 Enregistrer</button>
      </div>
    </div>
  `;
}

function closeModal(e) {
  if (e.target.classList.contains('modal-overlay')) closeModalForce();
}
function closeModalForce() {
  document.getElementById('modal-root').innerHTML = '';
}

function saveEdit(idx) {
  const amount = parseFloat(document.getElementById('edit-amount').value);
  const note = document.getElementById('edit-note').value.trim();
  if (!amount || amount <= 0) { toast('⚠ Montant invalide'); return; }
  const entry = state.history[idx];
  entry.amount = amount;
  entry.note = note;
  entry.splits = state.categories.map(c => ({ ...c, montant: amount * c.pct / 100, spent: 0 }));
  save();
  closeModalForce();
  toast('✅ Entrée modifiée !');
  render();
}

function deleteEntry(i) {
  state.history.splice(i, 1);
  save();
  toast('🗑 Entrée supprimée');
  render();
}

function exportCSV() {
  const rows = [['Date','Note','Montant','Catégorie','Sous-total']];
  state.history.forEach(e => {
    e.splits.forEach(s => {
      rows.push([e.date, e.note||'', e.amount, s.name, s.montant]);
    });
  });
  const csv = rows.map(r => r.join(';')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'budgetsplit_export.csv';
  a.click();
  toast('📥 Export CSV téléchargé !');
}

function exportPDF() {
  const now = new Date();
  const monthKey = now.toLocaleDateString('fr-FR', { month:'long', year:'numeric' });
  const groups = groupByMonth(state.history);
  const entries = groups[monthKey] || [];
  if (!entries.length) { toast('⚠ Aucune entrée ce mois'); return; }

  const total = entries.reduce((s,e)=>s+e.amount,0);
  const cur = CURRENCIES.find(c => c.code === state.currency) || CURRENCIES[0];
  const fmt2 = v => new Intl.NumberFormat('fr-FR',{maximumFractionDigits:0}).format(v) + ' ' + cur.symbol;

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/>
  <style>body{font-family:Arial,sans-serif;padding:30px;color:#111}
  h1{color:#6366f1}table{width:100%;border-collapse:collapse;margin-top:16px}
  th,td{border:1px solid #ddd;padding:8px 12px;font-size:13px}th{background:#f0f0f8}
  .total{font-weight:bold;color:#34d399}</style></head>
  <body><h1>💰 BudgetSplit — ${monthKey}</h1>
  <p>Total reçu : <strong>${fmt2(total)}</strong></p>
  <table><tr><th>Date</th><th>Note</th><th>Montant</th><th>Catégorie</th><th>Sous-total</th></tr>
  ${entries.flatMap(e => e.splits.map(s=>`<tr><td>${e.date}</td><td>${e.note||'—'}</td><td>${fmt2(e.amount)}</td><td>${s.emoji} ${s.name}</td><td>${fmt2(s.montant)}</td></tr>`)).join('')}
  </table></body></html>`;

  const blob = new Blob([html], { type:'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `budgetsplit_${monthKey.replace(' ','_')}.html`;
  a.click();
  toast('📄 Récap téléchargé !');
}

// ── SETTINGS ──
function renderSettings() {
  const t = total();
  return `
    <button class="ghost-btn" id="install-btn-settings" onclick="triggerInstall()" 
      style="border-color:var(--accent)44;color:var(--accent2);margin-bottom:4px">
      📲 Installer l'application
    </button>

    <div class="card">
      <div class="card-label">Devise</div>
      <select class="styled-select" onchange="state.currency=this.value;save();render()">
        ${CURRENCIES.map(c => `<option value="${c.code}" ${state.currency===c.code?'selected':''}>${c.label} (${c.symbol})</option>`).join('')}
      </select>
    </div>

    <div class="card">
      <div class="card-label">Catégories & Pourcentages</div>
      ${state.categories.map((c, i) => `
        <div class="setting-row">
          <div class="setting-top">
            <span class="setting-emoji">${c.emoji}</span>
            <input class="setting-name-input" value="${c.name}"
              oninput="state.categories[${i}].name=this.value;save()"
              placeholder="Nom de la catégorie"/>
            <input class="setting-pct-input" type="number" min="0" max="100" value="${c.pct}"
              oninput="state.categories[${i}].pct=Number(this.value);save();updateTotalPill()"
              style="border-color:${c.color}55;color:${c.color}"/>
          </div>
          <input type="range" class="setting-slider" min="0" max="100" value="${c.pct}"
            style="accent-color:${c.color}"
            oninput="state.categories[${i}].pct=Number(this.value);save();syncSettingPct(${i},this.value)"/>
        </div>
      `).join('')}

      <div class="total-pill ${t===100?'ok':'bad'}" id="total-pill">
        <span style="font-size:13px;color:${t===100?'var(--green)':'var(--red)'}">${t===100?'✓ Correct':'⚠ Ajuste les %'}</span>
        <span style="font-family:var(--mono);font-size:22px;font-weight:700;color:${t===100?'var(--green)':'var(--red)'}">${t}%</span>
      </div>
    </div>

    <button class="ghost-btn" onclick="resetDefaults()">↺ Réinitialiser les défauts</button>
    <button class="ghost-btn" onclick="clearAll()" style="color:var(--red);border-color:var(--red)44">🗑 Effacer toutes les données</button>
  `;
}

function syncSettingPct(i, val) {
  state.categories[i].pct = Number(val);
  const inputs = document.querySelectorAll('.setting-pct-input');
  if (inputs[i]) inputs[i].value = val;
  updateTotalPill();
}

function updateTotalPill() {
  const pill = document.getElementById('total-pill');
  const t = total();
  if (pill) {
    pill.className = `total-pill ${t===100?'ok':'bad'}`;
    pill.innerHTML = `
      <span style="font-size:13px;color:${t===100?'var(--green)':'var(--red)'}">${t===100?'✓ Correct':'⚠ Ajuste les %'}</span>
      <span style="font-family:var(--mono);font-size:22px;font-weight:700;color:${t===100?'var(--green)':'var(--red)'}">${t}%</span>
    `;
  }
}

function resetDefaults() {
  state.categories = [
    { id:1, emoji:'🏠', name:'Vie quotidienne', pct:30, color:COLORS[0] },
    { id:2, emoji:'💼', name:'Opérationnel', pct:30, color:COLORS[1] },
    { id:3, emoji:'💻', name:'Matériel / Outils', pct:10, color:COLORS[2] },
    { id:4, emoji:'🏦', name:'Épargne', pct:20, color:COLORS[3] },
    { id:5, emoji:'👗', name:'Vêtements / Perso', pct:10, color:COLORS[4] },
  ];
  save();
  toast('↺ Paramètres réinitialisés');
  render();
}

function clearAll() {
  if (!confirm('Effacer TOUTES les données ? Cette action est irréversible.')) return;
  state.history = [];
  state.goals = [];
  state.recurringIncomes = [];
  save();
  toast('🗑 Données effacées');
  render();
}

// ═══════════════════════════════════════════
// PWA INSTALL
// ═══════════════════════════════════════════
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('install-banner');
  banner.style.display = 'flex';
});

document.getElementById('install-go').addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('install-banner').style.display = 'none';
    if (outcome === 'accepted') toast('🎉 App installée !');
  }
});

document.getElementById('install-close').addEventListener('click', () => {
  document.getElementById('install-banner').style.display = 'none';
  localStorage.setItem('install_dismissed', '1');
});

// Android : ne pas réafficher si déjà dismissé
// if (localStorage.getItem('install_dismissed')) {
//   document.getElementById('install-banner').style.display = 'none';
// }

// iOS
const isIos = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
const isInStandaloneMode = window.navigator.standalone;
if (isIos && !isInStandaloneMode && !localStorage.getItem('ios_hint_dismissed')) {
  document.getElementById('install-banner').style.display = 'flex';
  document.getElementById('install-banner').querySelector('.inst-text').textContent = '📲 Appuie sur ⬆ Partager → Sur l\'écran d\'accueil';
  document.getElementById('install-go').style.display = 'none';
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
